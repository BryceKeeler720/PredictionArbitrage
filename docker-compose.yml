services:
  predarb:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: predarb
    restart: unless-stopped
    ports:
      - "8420:8420"
    env_file:
      - .env
    environment:
      # Override DB/Redis URLs to use Docker internal networking
      DATABASE_URL: postgresql+asyncpg://predarb:${DB_PASSWORD:-changeme}@postgres:5432/predarb
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - predarb-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8420/api/v1/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  postgres:
    image: postgres:16-alpine
    container_name: predarb-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: predarb
      POSTGRES_USER: predarb
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
    volumes:
      - pgdata:/var/lib/postgresql/data
    # No ports exposed — only reachable from Docker network
    networks:
      - predarb-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U predarb"]
      interval: 10s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: predarb-redis
    restart: unless-stopped
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru
    volumes:
      - redisdata:/data
    # No ports exposed — only reachable from Docker network
    networks:
      - predarb-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
  redisdata:

networks:
  predarb-net:
    driver: bridge
